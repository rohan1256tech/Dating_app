steps:
  # Step 1: Build the Docker image natively using the backend Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/detto-backend', '.']

  # Step 2: Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/detto-backend']

  # Step 3: Deploy the image to Cloud Run securely
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'detto-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/detto-backend'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--session-affinity'

options:
  # 🔥 FIX 1: The TypeScript compiler needs 1.9GB RAM. This upgrades the GCP Builder to 8GB!
  machineType: 'E2_HIGHCPU_8'
  
  # 🔥 FIX 2: Bypasses the "build.logs_bucket" IAM permission error you hit when triggering from GitHub
  logging: 'CLOUD_LOGGING_ONLY'
